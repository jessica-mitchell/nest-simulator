name: Convert examples

on: [push, pull_request]

jobs:
  convert_examples:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository content"
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: "Set up Python 3.x"
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: "Install Linux system dependencies"
        run: |
          sudo apt-get update

      - name: "Install Python dependencies"
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install sphinx sphinx-gallery

      - name: "Convert to notebooks"
        run: |
          find pynest/examples/ -iname "*.py"
          sphx_glr_python_to_jupyter.py $(find pynest/examples/ -iname "*.py")
          ls pynest/examples

      - name: "Upload notebooks as artifacts"
        uses: actions/upload-artifact@v2
        if: always()
        with:
          name: notebooks
          path: |
            pynest/examples/**/*.ipynb
            pynest/examples/*.ipynb

      - name: "Push a file to another repository"
        uses: dmnemec/copy_file_to_another_repo_action@v1.1.1
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}

        with:
          source_file: "pynest/examples/balancedneuron.ipynb"
          destination_repo: "nest/nest-simulator-examples"
          destination_folder: "notebooks"
          user_email: "mitchell20j@gmail.com"
          user_name: "jessica-mitchell"
