version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - openjdk-8-jre
  jobs:
    pre_install:
      - echo $PATH
      - wget "https://github.com/plantuml/plantuml/releases/download/v1.2023.10/plantuml.jar" -O "plantuml-1.2023.10.jar"
      - echo "ee06454723028763dd8280459e8fd8f31fcd85b1ae8d9ab0e32122243c098c3b" "plantuml-1.2023.10.jar" | sha256sum -c
      - unset DISPLAY
      - /usr/bin/java -Djava.awt.headless=false -jar "plantuml-1.2023.10.jar"
sphinx:
  builder: html
  configuration: doc/htmldoc/conf.py

python:
  install:
    - requirements: doc/requirements.txt
