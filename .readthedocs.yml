version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    default-jre
  jobs:
    pre_install:
      - echo $PATH
      - PACKAGE="plantuml"
      - VERSION="1.2023.10"
      - SHA256SUM="ee06454723028763dd8280459e8fd8f31fcd85b1ae8d9ab0e32122243c098c3b"

      - URL="https://github.com/plantuml/plantuml/releases/download/v${VERSION}/${PACKAGE}.jar"
      - JAR="${PACKAGE}-${VERSION}.jar"
      - wget "$URL" -O "${JAR}"
      - echo "$SHA256SUM  ${JAR}" | sha256sum -c

sphinx:
  builder: html
  configuration: doc/htmldoc/conf.py

python:
  install:
    - requirements: doc/requirements.txt
